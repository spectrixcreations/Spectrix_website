<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SPECTRIX INTERNS | Glowing Certificate Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SheetJS for Excel parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            color: #e8e8e8;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }

        /* Crystal rain (same as main) */
        .crystal-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .crystal {
            position: absolute;
            bottom: -20px;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ffffff, #888888);
            border-radius: 1px;
            opacity: 0;
            animation: floatUpGlow linear infinite;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
        }

        .crystal.large {
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ffffff, #aaaaff);
        }

        .crystal.small {
            width: 2px;
            height: 2px;
            background: radial-gradient(circle, #dddddd, #666666);
        }

        @keyframes floatUpGlow {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }

            50% {
                opacity: 0.8;
                transform: translateY(-50vh) rotate(180deg);
            }

            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .crystal.fade-behind {
            opacity: 0.1 !important;
            transition: opacity 0.2s;
        }

        .canvas-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .site-wrapper {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* Page header */
        .page-header {
            padding: 140px 0 60px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .page-header h1 span {
            color: #aaa;
        }

        .page-header p {
            color: #777;
            max-width: 700px;
            margin: 20px auto 0;
            font-size: 18px;
        }

        .intern-count-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 5px 16px;
            font-size: 14px;
            margin-top: 20px;
            color: #bbb;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Interns grid */
        .interns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 32px;
            margin: 60px 0 40px;
        }

        /* CARD STYLING – SAME RAY ANIMATION AS REFERENCE */
        .intern-card {
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(12px);

            padding: 32px 22px 28px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Glowing ray animation (same as original file) */
        .intern-card::before,
        .intern-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 1;
        }

        .intern-card::before {
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.7) 50%, rgba(255, 255, 255, 0) 100%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .intern-card::after {
            background: linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.7) 50%, rgba(255, 255, 255, 0) 100%);
            transform: translateY(-100%);
            transition: transform 0.6s ease;
        }

        .intern-card:hover::before {
            transform: translateX(100%);
            opacity: 1;
        }

        .intern-card:hover::after {
            transform: translateY(100%);
            opacity: 1;
        }

        .intern-card:hover {
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-10px);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
            background: rgba(15, 15, 15, 0.9);
        }

        .intern-photo {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            transition: all 0.35s ease;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .intern-card:hover .intern-photo {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .intern-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .intern-role {
            color: #b0b0b0;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
        }

        .intern-bio {
            color: #aaa;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 22px;
            padding: 0 6px;
        }

        .cert-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: #f0f0f0;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: 0.25s;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
        }

        .cert-link i {
            font-size: 14px;
        }

        .cert-link:hover {
            background: #ffffff;
            color: #000000;
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 5px 12px rgba(255, 255, 255, 0.1);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 8px;
        }

        .social-icons a {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            text-decoration: none;
            transition: 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-icons a:hover {
            background: #fff;
            color: #000;
            transform: translateY(-4px);
            border-color: #fff;
        }

        /* loader & error */
        .loader-placeholder {
            text-align: center;
            padding: 80px 20px;
            color: #aaa;
            font-size: 18px;
            grid-column: 1 / -1;
        }

        .error-message {
            background: rgba(255, 50, 50, 0.1);
            border-left: 4px solid #ff5555;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin: 40px 0;
            backdrop-filter: blur(8px);
        }

        footer {
            background: #020202;
            padding: 50px 0 30px;
            margin-top: 60px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }

        .footer-bottom {
            color: #aaa;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .site-wrapper {
                padding: 0 24px;
            }

            .interns-grid {
                gap: 20px;
            }

            .page-header h1 {
                font-size: 36px;
            }

            .nav-container {
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="crystal-container" id="crystalContainer"></div>
    <canvas class="canvas-3d" id="threeCanvas"></canvas>

    <!-- <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">SPECTRIX<span style="background:none; color:#fff;"> CREATIONS</span></a>
            <div class="nav-links">
                <a href="index.html">HOME</a>

                <a href="interns.html" style="color:#fff; border-bottom: 1px solid #fff;">INTERNS</a>

    <div class="site-wrapper">
        <div class="page-header">
            <h1>MEET OUR <span>INTERNS</span></h1>
            <p>Certified excellence — each glow reflects a milestone achieved.</p>
            <!-- <div class="intern-count-badge" id="internCountBadge">✨ loading certified members</div> -->
        </div>

        <div class="interns-grid" id="internsGrid">
            <div class="loader-placeholder"><i class="fas fa-spinner fa-pulse"></i> Fetching certificate data...</div>
        </div>
    </div>

    <footer>
        <div class="site-wrapper">
            <div class="footer-bottom">
                <p>© 2025 SPECTRIX CREATIONS – Glowing Certificate Portal | Innovate. Inspire. Illuminate.</p>
            </div>
        </div>
    </footer>

    <script>
        // ----------------------------------------------
        // 1. Helper: deterministic avatar images (based on name)
        // ----------------------------------------------
        function getStableAvatars(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = ((hash << 5) - hash) + name.charCodeAt(i);
                hash |= 0;
            }
            const absHash = Math.abs(hash);
            const gender = (absHash % 2 === 0) ? 'women' : 'men';
            const defaultIdx = (absHash % 85) + 10;
            const hoverIdx = ((defaultIdx + 27) % 85) + 10;
            const defaultImage = `https://randomuser.me/api/portraits/${gender}/${defaultIdx}.jpg`;
            const hoverImage = `https://randomuser.me/api/portraits/${gender}/${hoverIdx}.jpg`;
            return { defaultImage, hoverImage };
        }

        const creativeRoles = [
            "⚡ Full-stack Intern", "🎨 UI/UX Trainee", "📱 App Dev Intern", "🧠 AI/ML Intern",
            "🎮 Game Dev Intern", "📢 Marketing Intern", "🔍 QA Engineer Intern", "💡 Creative Technologist",
            "🌐 Web3 Intern", "☁️ Cloud Intern", "📊 Data Analyst Intern", "🖌️ Brand Design Intern"
        ];

        const bioVariants = [
            "Building next-gen solutions with bold ideas and relentless curiosity.",
            "Crafting digital experiences that blend design & functionality.",
            "Obsessed with clean code and meaningful user impact.",
            "Transforming concepts into reality, one line at a time.",
            "Passionate about emerging tech and creative problem-solving.",
            "Bringing fresh energy and innovation to every project."
        ];

        // ----------------------------------------------
        // 2. Load Excel and Render cards with RAY ANIMATION
        // ----------------------------------------------
        async function loadCertificatesAndRender() {
            const gridContainer = document.getElementById('internsGrid');
            // const countBadge = document.getElementById('internCountBadge');

            try {
                const response = await fetch("./certificates.xlsx");
                if (!response.ok) throw new Error(`HTTP ${response.status}: certificates.xlsx not found.`);

                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: "array" });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet);

                const validInterns = rows.filter(row => row["Name"] && row["Filename"]).map(row => ({
                    name: String(row["Name"]).trim(),
                    filename: String(row["Filename"]).trim()
                }));

                if (validInterns.length === 0) {
                    gridContainer.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> No certificate entries found. Add "Name" and "Filename" columns.</div>`;
                    // countBadge.textContent = `0 certificates`;
                    return;
                }

                // countBadge.textContent = `${validInterns.length} glowing ${validInterns.length === 1 ? 'member' : 'members'}`;
                gridContainer.innerHTML = '';

                validInterns.forEach((intern, idx) => {
                    const { name, filename } = intern;
                    const { defaultImage, hoverImage } = getStableAvatars(name);
                    const role = creativeRoles[idx % creativeRoles.length];
                    const bioSeed = (name.length + idx) % bioVariants.length;
                    const bioText = bioVariants[bioSeed];

                    const card = document.createElement('div');
                    card.className = 'intern-card';

                    const photoDiv = document.createElement('div');
                    photoDiv.className = 'intern-photo';
                    photoDiv.style.backgroundImage = `url('${defaultImage}')`;
                    photoDiv.style.backgroundSize = 'cover';
                    photoDiv.style.backgroundPosition = 'center';

                    // Hover image swap
                    card.addEventListener('mouseenter', () => {
                        photoDiv.style.backgroundImage = `url('${hoverImage}')`;
                    });
                    card.addEventListener('mouseleave', () => {
                        photoDiv.style.backgroundImage = `url('${defaultImage}')`;
                    });

                    const nameEl = document.createElement('div'); nameEl.className = 'intern-name'; nameEl.textContent = name;
                    const roleEl = document.createElement('div'); roleEl.className = 'intern-role'; roleEl.textContent = role;
                    const bioEl = document.createElement('div'); bioEl.className = 'intern-bio'; bioEl.textContent = bioText;

                    const certLink = document.createElement('a');
                    certLink.className = 'cert-link';
                    certLink.href = `view_certificate.html?cert=${encodeURIComponent(filename)}`;
                    certLink.innerHTML = '<i class="fas fa-certificate"></i> View Certificate';
                    certLink.target = '_blank';

                    const socialDiv = document.createElement('div');
                    socialDiv.className = 'social-icons';
                    socialDiv.innerHTML = `
                        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                        <a href="#" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                        <a href="#" target="_blank"><i class="fab fa-github"></i></a>
                    `;

                    card.appendChild(photoDiv);
                    card.appendChild(nameEl);
                    card.appendChild(roleEl);
                    card.appendChild(bioEl);
                    card.appendChild(certLink);
                    card.appendChild(socialDiv);
                    gridContainer.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                gridContainer.innerHTML = `<div class="error-message"><i class="fas fa-database"></i> Failed to load certificates.xlsx.<br>Ensure the file exists with columns 'Name' and 'Filename'.<br><span style="font-size:13px;">${error.message}</span></div>`;
                // countBadge.textContent = `⚠️ data error`;
            }
        }

        // ----------------------------------------------
        // 3. Crystal rain + fade effect (enhanced)
        // ----------------------------------------------
        function createCrystals() {
            const container = document.getElementById('crystalContainer');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 140; i++) {
                const c = document.createElement('div');
                c.className = 'crystal';
                if (Math.random() < 0.12) c.classList.add('large');
                else if (Math.random() > 0.85) c.classList.add('small');
                c.style.left = Math.random() * 100 + '%';
                c.style.animationDuration = (2.5 + Math.random() * 7) + 's';
                c.style.animationDelay = Math.random() * 18 + 's';
                container.appendChild(c);
            }
        }

        // Crystal fade behind cards (exactly like reference)
        function updateCrystalFade() {
            const cards = document.querySelectorAll('.intern-card');
            const crystals = document.querySelectorAll('.crystal');
            if (!cards.length || !crystals.length) return;
            cards.forEach(card => {
                const cardRect = card.getBoundingClientRect();
                crystals.forEach(crystal => {
                    const crystalRect = crystal.getBoundingClientRect();
                    if (crystalRect.bottom > cardRect.top && crystalRect.top < cardRect.bottom &&
                        crystalRect.right > cardRect.left && crystalRect.left < cardRect.right) {
                        crystal.classList.add('fade-behind');
                    } else {
                        crystal.classList.remove('fade-behind');
                    }
                });
            });
        }

        // 3D particle background
        function create3DBackground() {
            const canvas = document.getElementById('threeCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            let particles = [];

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function initParticles() {
                particles = [];
                const particleCount = Math.min(75, Math.floor(width * height / 16000));
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 2 + 0.8,
                        alpha: Math.random() * 0.2 + 0.03,
                        vx: (Math.random() - 0.5) * 0.2,
                        vy: (Math.random() - 0.5) * 0.12
                    });
                }
            }

            function animateParticles() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                    ctx.fill();
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -30) p.x = width + 30;
                    if (p.x > width + 30) p.x = -30;
                    if (p.y < -30) p.y = height + 30;
                    if (p.y > height + 30) p.y = -30;
                }
                requestAnimationFrame(animateParticles);
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            animateParticles();
        }

        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            createCrystals();
            create3DBackground();
            loadCertificatesAndRender().then(() => {
                // start crystal fade detection after cards exist
                setInterval(updateCrystalFade, 120);
            }).catch(() => {
                setInterval(updateCrystalFade, 120);
            });
        });
    </script>
</body>
