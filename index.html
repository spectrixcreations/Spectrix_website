<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SPECTRIX CREATIONS | Dev & Content Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', 'Poppins', system-ui, sans-serif;
      background: #050505;
      color: #e8e8e8;
      line-height: 1.6;
      overflow-x: hidden;
      overflow-y: auto;
      cursor: default;
      height: 100vh;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4a4a4a;
    }

    /* ===== GLOWING CRYSTALS REVERSE RAIN ===== */
    .crystal-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }

    .crystal {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #ffffff, #888888);
      border-radius: 1px;
      opacity: 0;
      animation: floatUpGlow linear infinite;
      pointer-events: none;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.6), 0 0 6px rgba(255, 255, 255, 0.3);
    }

    .crystal.large {
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #ffffff, #aaaaff);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8), 0 0 9px rgba(255, 255, 255, 0.4);
    }

    .crystal.small {
      width: 2px;
      height: 2px;
      background: radial-gradient(circle, #dddddd, #666666);
      box-shadow: 0 0 2px rgba(255, 255, 255, 0.4);
    }

    @keyframes floatUpGlow {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.6;
      }

      50% {
        opacity: 0.8;
        transform: translateY(-50vh) rotate(180deg);
      }

      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .crystal.fade-behind {
      opacity: 0.1 !important;
      box-shadow: 0 0 2px rgba(255, 255, 255, 0.2) !important;
    }

    /* 3D Background Canvas */
    .canvas-3d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Main Container - but all interactive removed, only visual */
    .redirect-wrapper {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    /* Hero style for redirect message */
    .redirect-card {
      background: rgba(5, 5, 5, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 60px 50px;
      max-width: 700px;
      width: 100%;
      animation: fadeScaleIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    @keyframes fadeScaleIn {
      0% {
        opacity: 0;
        transform: scale(0.96) translateY(20px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .logo-large {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffffff, #aaaaaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 35px;
      letter-spacing: 1px;
    }

    .redirect-message {
      font-size: 20px;
      margin-bottom: 30px;
      color: #ddd;
    }

    .countdown-box {
      display: inline-flex;
      align-items: baseline;
      gap: 12px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 28px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-bottom: 40px;
      backdrop-filter: blur(4px);
    }

    .countdown-number {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }

    .countdown-text {
      font-size: 20px;
      font-weight: 500;
      color: #bbb;
      letter-spacing: 1px;
    }

    .redirect-btn {
      display: inline-block;
      padding: 14px 38px;
      background: #fff;
      color: #050505;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 40px;
      transition: all 0.3s ease;
      font-size: 16px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      border: none;
      cursor: pointer;
    }

    .redirect-btn:hover {
      background: #ddd;
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(255, 255, 255, 0.15);
    }

    .note {
      margin-top: 35px;
      font-size: 13px;
      color: #888;
    }

    .spark-icon {
      display: inline-block;
      margin: 0 8px;
      animation: pulseGlow 1.8s infinite;
    }

    @keyframes pulseGlow {
      0% {
        opacity: 0.5;
        text-shadow: 0 0 0px #fff;
      }

      100% {
        opacity: 1;
        text-shadow: 0 0 6px #fff;
      }
    }

    /* Floating elements (same 3D style but decorative) */
    .deco-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .rotating-mini-cube {
      position: absolute;
      bottom: 12%;
      left: 5%;
      width: 80px;
      height: 80px;
      transform-style: preserve-3d;
      animation: rotateCubeSlow 18s infinite linear;
      opacity: 0.4;
    }

    @keyframes rotateCubeSlow {
      0% {
        transform: rotateX(0deg) rotateY(0deg);
      }

      100% {
        transform: rotateX(360deg) rotateY(360deg);
      }
    }

    .mini-face {
      position: absolute;
      width: 40px;
      height: 40px;
      background: rgba(20, 20, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .m-f1 {
      transform: translateZ(20px);
    }

    .m-f2 {
      transform: rotateY(180deg) translateZ(20px);
    }

    .m-f3 {
      transform: rotateY(90deg) translateZ(20px);
    }

    .m-f4 {
      transform: rotateY(-90deg) translateZ(20px);
    }

    .m-f5 {
      transform: rotateX(90deg) translateZ(20px);
    }

    .m-f6 {
      transform: rotateX(-90deg) translateZ(20px);
    }

    @media (max-width: 768px) {
      .redirect-wrapper {
        padding: 0 20px;
      }

      .redirect-card {
        padding: 40px 25px;
      }

      .logo-large {
        font-size: 36px;
      }

      .countdown-number {
        font-size: 36px;
      }

      .rotating-mini-cube {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Glowing Crystals Reverse Rain (same immersive effect) -->
  <div class="crystal-container" id="crystalContainer"></div>

  <!-- 3D Background Canvas (same particle system) -->
  <canvas class="canvas-3d" id="threeCanvas"></canvas>

  <!-- Decorative 3D element (crystal cube vibe) -->
  <div class="deco-shapes">
    <div class="rotating-mini-cube">
      <div class="mini-face m-f1"><i class="fas fa-code"></i></div>
      <div class="mini-face m-f2"><i class="fas fa-gamepad"></i></div>
      <div class="mini-face m-f3"><i class="fas fa-mobile-alt"></i></div>
      <div class="mini-face m-f4"><i class="fas fa-film"></i></div>
      <div class="mini-face m-f5"><i class="fas fa-globe"></i></div>
      <div class="mini-face m-f6"><i class="fas fa-crown"></i></div>
    </div>
  </div>

  <!-- Main Content: Beautiful Redirect Interface with countdown and manual option -->
  <div class="redirect-wrapper">
    <div class="redirect-card">
      <div class="logo-large">SPECTRIX CREATIONS</div>
      <div class="tagline">✦ Dev & Content Studio ✦</div>
      <div class="redirect-message">
        <i class="fas fa-arrow-right spark-icon"></i> Experience our full universe
        <i class="fas fa-star spark-icon"></i>
      </div>
      <div class="countdown-box">
        <span class="countdown-number" id="countdownDisplay">5</span>
        <span class="countdown-text">redirecting to official site</span>
      </div>
      <a href="https://www.spectrixcreations.com/" class="redirect-btn" id="manualRedirectBtn">
        <i class="fas fa-external-link-alt"></i> ENTER SPECTRIX →
      </a>
      <div class="note">
        <i class="fas fa-crystal"></i> You will be automatically redirected in a moment
      </div>
    </div>
  </div>

  <script>
    // ======================== CRYSTAL RAIN (same engine) ========================
    function createCrystals() {
      const container = document.getElementById('crystalContainer');
      if (!container) return;
      const crystalCount = 120;

      for (let i = 0; i < crystalCount; i++) {
        const crystal = document.createElement('div');
        crystal.className = 'crystal';

        const sizeType = Math.random();
        if (sizeType < 0.15) crystal.classList.add('large');
        else if (sizeType > 0.85) crystal.classList.add('small');

        crystal.style.left = Math.random() * 100 + '%';
        crystal.style.animationDuration = (3 + Math.random() * 7) + 's';
        crystal.style.animationDelay = Math.random() * 20 + 's';
        crystal.style.opacity = 0.3 + Math.random() * 0.6;

        container.appendChild(crystal);
      }
    }

    function updateCrystalFade() {
      const boxes = document.querySelectorAll('.redirect-card, .countdown-box, .redirect-btn');
      const crystals = document.querySelectorAll('.crystal');
      if (!crystals.length) return;
      boxes.forEach(box => {
        const boxRect = box.getBoundingClientRect();
        crystals.forEach(crystal => {
          const crystalRect = crystal.getBoundingClientRect();
          if (crystalRect.bottom > boxRect.top && crystalRect.top < boxRect.bottom &&
            crystalRect.right > boxRect.left && crystalRect.left < boxRect.right) {
            crystal.classList.add('fade-behind');
          } else {
            crystal.classList.remove('fade-behind');
          }
        });
      });
    }

    // 3D Background Particles (identical to original but lightweight)
    function create3DBackground() {
      const canvas = document.getElementById('threeCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      let particles = [];
      for (let i = 0; i < 70; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2 + 0.6,
          alpha: Math.random() * 0.2 + 0.02,
          vx: (Math.random() - 0.5) * 0.2,
          vy: (Math.random() - 0.5) * 0.2,
          glow: Math.random() * 0.4 + 0.1
        });
      }

      function animate() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.shadowBlur = 5;
          ctx.shadowColor = `rgba(255, 255, 255, ${p.glow})`;
          ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
          ctx.fill();
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < -50) p.x = canvas.width + 50;
          if (p.x > canvas.width + 50) p.x = -50;
          if (p.y < -50) p.y = canvas.height + 50;
          if (p.y > canvas.height + 50) p.y = -50;
        }
        requestAnimationFrame(animate);
      }
      animate();
    }

    // ======================== REDIRECT LOGIC (preserve theme) ========================
    let countdown = 5;
    const countdownElement = document.getElementById('countdownDisplay');
    let intervalId = null;
    let redirectTimeout = null;

    function performRedirect() {
      if (redirectTimeout) clearTimeout(redirectTimeout);
      if (intervalId) clearInterval(intervalId);
      window.location.href = "https://www.spectrixcreations.com/";
    }

    function updateCountdown() {
      if (countdown <= 0) {
        if (intervalId) clearInterval(intervalId);
        performRedirect();
        return;
      }
      if (countdownElement) {
        countdownElement.innerText = countdown;
      }
      countdown--;
    }

    function startCountdown() {
      if (intervalId) clearInterval(intervalId);
      if (redirectTimeout) clearTimeout(redirectTimeout);
      countdown = 5;
      updateCountdown();
      intervalId = setInterval(() => {
        updateCountdown();
      }, 1000);
      // ultimate safety redirect after max 6 secs
      redirectTimeout = setTimeout(() => {
        if (intervalId) clearInterval(intervalId);
        performRedirect();
      }, 6000);
    }

    // manual redirect button
    const manualBtn = document.getElementById('manualRedirectBtn');
    if (manualBtn) {
      manualBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (intervalId) clearInterval(intervalId);
        if (redirectTimeout) clearTimeout(redirectTimeout);
        window.location.href = "https://www.spectrixcreations.com/";
      });
    }

    // Intersection / subtle animation re-trigger for cards?
    function enhanceVisuals() {
      const card = document.querySelector('.redirect-card');
      if (card) {
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'fadeScaleIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards';
      }
    }

    // Optional: Glow effects for countdown updates (just style)
    function attachCountdownGlow() {
      if (countdownElement) {
        const originalUpdate = updateCountdown;
        // override not needed, just add extra glow on each tick
        setInterval(() => {
          if (countdownElement && document.body.contains(countdownElement)) {
            countdownElement.style.textShadow = '0 0 8px rgba(255,255,255,0.8)';
            setTimeout(() => {
              if (countdownElement) countdownElement.style.textShadow = 'none';
            }, 150);
          }
        }, 1000);
      }
    }

    // interaction to keep fade-behind sync across scroll/resize
    window.addEventListener('scroll', () => {
      updateCrystalFade();
    });
    window.addEventListener('resize', () => {
      updateCrystalFade();
    });

    // initialize full environment
    document.addEventListener('DOMContentLoaded', () => {
      createCrystals();
      create3DBackground();
      startCountdown();
      attachCountdownGlow();
      enhanceVisuals();
      setInterval(updateCrystalFade, 150);
      // small hack to ensure 3d canvas gets proper size
      setTimeout(() => {
        if (window.dispatchEvent) window.dispatchEvent(new Event('resize'));
        updateCrystalFade();
      }, 100);
    });
  </script>
</body>

</html>
