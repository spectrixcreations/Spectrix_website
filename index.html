<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SPECTRIX CREATIONS | Dev & Content Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', 'Poppins', system-ui, sans-serif;
      background: #050505;
      color: #e8e8e8;
      line-height: 1.6;
      overflow-x: hidden;
      overflow-y: auto;
      cursor: default;
      height: 100vh;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4a4a4a;
    }

    /* ===== GLOWING CRYSTALS REVERSE RAIN ===== */
    .crystal-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }

    .crystal {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #ffffff, #888888);
      border-radius: 1px;
      opacity: 0;
      animation: floatUpGlow linear infinite;
      pointer-events: none;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.6), 0 0 6px rgba(255, 255, 255, 0.3);
    }

    .crystal.large {
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #ffffff, #aaaaff);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8), 0 0 9px rgba(255, 255, 255, 0.4);
    }

    .crystal.small {
      width: 2px;
      height: 2px;
      background: radial-gradient(circle, #dddddd, #666666);
      box-shadow: 0 0 2px rgba(255, 255, 255, 0.4);
    }

    @keyframes floatUpGlow {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.6;
      }

      50% {
        opacity: 0.8;
        transform: translateY(-50vh) rotate(180deg);
      }

      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .crystal.fade-behind {
      opacity: 0.1 !important;
      box-shadow: 0 0 2px rgba(255, 255, 255, 0.2) !important;
    }

    /* 3D Background Canvas */
    .canvas-3d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Main Container - immersive redirect card */
    .redirect-wrapper {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    /* Hero style card */
    .redirect-card {
      background: rgba(5, 5, 5, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 60px 50px;
      max-width: 700px;
      width: 100%;
      animation: fadeScaleIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: all 0.3s ease;
    }

    .redirect-card:hover {
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    @keyframes fadeScaleIn {
      0% {
        opacity: 0;
        transform: scale(0.96) translateY(20px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .logo-large {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffffff, #aaaaaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 35px;
      letter-spacing: 1px;
    }

    .redirect-message {
      font-size: 20px;
      margin-bottom: 40px;
      color: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .spark-icon {
      display: inline-block;
      animation: pulseGlow 1.8s infinite;
    }

    @keyframes pulseGlow {
      0% {
        opacity: 0.5;
        text-shadow: 0 0 0px #fff;
      }

      100% {
        opacity: 1;
        text-shadow: 0 0 6px #fff;
      }
    }

    .redirect-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 42px;
      background: #fff;
      color: #050505;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 60px;
      transition: all 0.3s ease;
      font-size: 18px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      border: none;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .redirect-btn i {
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    .redirect-btn:hover {
      background: #e0e0e0;
      transform: translateY(-4px);
      box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
    }

    .redirect-btn:hover i {
      transform: translateX(5px);
    }

    .note {
      font-size: 13px;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .note i {
      font-size: 12px;
      color: #aaa;
    }

    /* Floating 3D cube (same vibe as original) */
    .deco-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .rotating-mini-cube {
      position: absolute;
      bottom: 12%;
      left: 5%;
      width: 80px;
      height: 80px;
      transform-style: preserve-3d;
      animation: rotateCubeSlow 18s infinite linear;
      opacity: 0.4;
    }

    @keyframes rotateCubeSlow {
      0% {
        transform: rotateX(0deg) rotateY(0deg);
      }

      100% {
        transform: rotateX(360deg) rotateY(360deg);
      }
    }

    .mini-face {
      position: absolute;
      width: 40px;
      height: 40px;
      background: rgba(20, 20, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border-radius: 4px;
    }

    .m-f1 {
      transform: translateZ(20px);
    }

    .m-f2 {
      transform: rotateY(180deg) translateZ(20px);
    }

    .m-f3 {
      transform: rotateY(90deg) translateZ(20px);
    }

    .m-f4 {
      transform: rotateY(-90deg) translateZ(20px);
    }

    .m-f5 {
      transform: rotateX(90deg) translateZ(20px);
    }

    .m-f6 {
      transform: rotateX(-90deg) translateZ(20px);
    }

    /* Additional floating orb effect (background richness) */
    .floating-orb {
      position: absolute;
      right: 8%;
      top: 20%;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      filter: blur(30px);
      pointer-events: none;
      animation: floatOrb 12s infinite alternate;
    }

    @keyframes floatOrb {
      0% {
        transform: translateY(0px) scale(1);
        opacity: 0.3;
      }

      100% {
        transform: translateY(-40px) scale(1.1);
        opacity: 0.6;
      }
    }

    @media (max-width: 768px) {
      .redirect-wrapper {
        padding: 0 20px;
      }

      .redirect-card {
        padding: 40px 25px;
      }

      .logo-large {
        font-size: 36px;
      }

      .redirect-btn {
        padding: 12px 28px;
        font-size: 16px;
      }

      .rotating-mini-cube {
        display: none;
      }

      .floating-orb {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Glowing Crystals Reverse Rain (full atmospheric effect) -->
  <div class="crystal-container" id="crystalContainer"></div>

  <!-- 3D Background Canvas (dynamic particle system) -->
  <canvas class="canvas-3d" id="threeCanvas"></canvas>

  <!-- Decorative 3D elements (crystal cube, orb) -->
  <div class="deco-shapes">
    <div class="rotating-mini-cube">
      <div class="mini-face m-f1"><i class="fas fa-code"></i></div>
      <div class="mini-face m-f2"><i class="fas fa-gamepad"></i></div>
      <div class="mini-face m-f3"><i class="fas fa-mobile-alt"></i></div>
      <div class="mini-face m-f4"><i class="fas fa-film"></i></div>
      <div class="mini-face m-f5"><i class="fas fa-globe"></i></div>
      <div class="mini-face m-f6"><i class="fas fa-crown"></i></div>
    </div>
    <div class="floating-orb"></div>
  </div>

  <!-- Main Content: Beautiful Redirect Interface with direct link (no timer) -->
  <div class="redirect-wrapper">
    <div class="redirect-card">
      <div class="logo-large">SPECTRIX CREATIONS</div>
      <div class="tagline">✦ Dev & Content Studio ✦</div>
      <div class="redirect-message">
        <i class="fas fa-crystal spark-icon"></i>
        <span>Experience the full spectrum of innovation</span>
        <i class="fas fa-star spark-icon"></i>
      </div>
      <!-- DIRECT REDIRECT LINK (manual) -->
      <a href="https://www.spectrixcreations.com/" class="redirect-btn" id="enterSiteBtn">
        <i class="fas fa-external-link-alt"></i> ENTER SPECTRIX →
      </a>
      <div class="note">
        <i class="fas fa-globe"></i> spectrixcreations.com — where ideas ignite
      </div>
    </div>
  </div>

  <script>
    // ======================== CRYSTAL RAIN SYSTEM (identical to original theme) ========================
    function createCrystals() {
      const container = document.getElementById('crystalContainer');
      if (!container) return;
      // Clear any existing crystals to avoid duplication (safe)
      container.innerHTML = '';
      const crystalCount = 130;

      for (let i = 0; i < crystalCount; i++) {
        const crystal = document.createElement('div');
        crystal.className = 'crystal';

        const sizeType = Math.random();
        if (sizeType < 0.15) crystal.classList.add('large');
        else if (sizeType > 0.85) crystal.classList.add('small');

        crystal.style.left = Math.random() * 100 + '%';
        crystal.style.animationDuration = (3 + Math.random() * 7) + 's';
        crystal.style.animationDelay = Math.random() * 20 + 's';
        crystal.style.opacity = 0.3 + Math.random() * 0.6;

        container.appendChild(crystal);
      }
    }

    // Fade crystals behind UI elements to enhance depth (same as original effect)
    function updateCrystalFade() {
      const boxes = document.querySelectorAll('.redirect-card, .redirect-btn');
      const crystals = document.querySelectorAll('.crystal');
      if (!crystals.length) return;
      boxes.forEach(box => {
        const boxRect = box.getBoundingClientRect();
        crystals.forEach(crystal => {
          const crystalRect = crystal.getBoundingClientRect();
          if (crystalRect.bottom > boxRect.top && crystalRect.top < boxRect.bottom &&
            crystalRect.right > boxRect.left && crystalRect.left < boxRect.right) {
            crystal.classList.add('fade-behind');
          } else {
            crystal.classList.remove('fade-behind');
          }
        });
      });
    }

    // 3D Particle Background (same as original but optimized)
    function create3DBackground() {
      const canvas = document.getElementById('threeCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      let particles = [];
      const PARTICLE_COUNT = 80;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2 + 0.5,
          alpha: Math.random() * 0.2 + 0.02,
          vx: (Math.random() - 0.5) * 0.2,
          vy: (Math.random() - 0.5) * 0.2,
          glow: Math.random() * 0.4 + 0.1
        });
      }

      function animate() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.shadowBlur = 5;
          ctx.shadowColor = `rgba(255, 255, 255, ${p.glow})`;
          ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
          ctx.fill();
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < -50) p.x = canvas.width + 50;
          if (p.x > canvas.width + 50) p.x = -50;
          if (p.y < -50) p.y = canvas.height + 50;
          if (p.y > canvas.height + 50) p.y = -50;
        }
        requestAnimationFrame(animate);
      }
      animate();
    }

    // Additional subtle hover micro-interactions that keep theme alive
    function addHoverEnhancements() {
      const btn = document.getElementById('enterSiteBtn');
      if (btn) {
        btn.addEventListener('mouseenter', () => {
          // just for atmosphere: adds a glow to the card border (cosmetic)
          const card = document.querySelector('.redirect-card');
          if (card) {
            card.style.transition = 'all 0.2s ease';
            card.style.borderColor = 'rgba(255, 255, 255, 0.5)';
          }
        });
        btn.addEventListener('mouseleave', () => {
          const card = document.querySelector('.redirect-card');
          if (card) {
            card.style.borderColor = 'rgba(255, 255, 255, 0.15)';
          }
        });
      }
    }

    // Ensure crystals reposition on scroll/resize
    window.addEventListener('scroll', () => {
      updateCrystalFade();
    });
    window.addEventListener('resize', () => {
      updateCrystalFade();
      const canvas = document.getElementById('threeCanvas');
      if (canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    });

    // Full initialization: preserve original theme, crystals, particles, redirect link ready
    document.addEventListener('DOMContentLoaded', () => {
      createCrystals();
      create3DBackground();
      addHoverEnhancements();
      // initial fade sync
      setTimeout(() => {
        updateCrystalFade();
      }, 50);
      setInterval(updateCrystalFade, 180);

      // Optional: small animation replay for card entrance (just for delight)
      const card = document.querySelector('.redirect-card');
      if (card) {
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'fadeScaleIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards';
      }

      // No timer, no auto redirect — only manual link. But to match the request "just add the redirect link"
      // The link is fully functional and preserves everything else.
    });
  </script>
</body>

</html>
